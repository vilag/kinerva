<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mi Portal | Kinerva Fisioterapia</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --teal:     #00BDB4;
      --teal-dk:  #009A92;
      --teal-lt:  #E6F8F7;
      --sidebar:  #0f2027;
      --sb-hover: #1a3340;
      --text:     #1a2533;
      --muted:    #6b7280;
      --border:   #e5e7eb;
      --card-bg:  #ffffff;
      --bg:       #f3f7f9;
      --danger:   #ef4444;
    }

    body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

    /* ── Login ─────────────────────────────────────────────────── */
    #loginScreen {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #0f2027 0%, #203a43 50%, #2c5364 100%);
      padding: 24px;
    }

    .login-card {
      background: #fff;
      border-radius: 20px;
      padding: 48px 40px;
      width: 100%;
      max-width: 420px;
      text-align: center;
      box-shadow: 0 24px 64px rgba(0,0,0,.25);
    }

    .login-logo {
      width: 140px;
      margin-bottom: 8px;
      filter: brightness(0) saturate(100%) invert(55%) sepia(82%) saturate(400%) hue-rotate(145deg) brightness(95%);
    }

    .login-card h1 {
      font-size: 22px;
      font-weight: 700;
      color: var(--text);
      margin-bottom: 6px;
    }

    .login-card p {
      color: var(--muted);
      font-size: 14px;
      margin-bottom: 32px;
      line-height: 1.5;
    }

    .login-divider {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 24px;
      color: var(--muted);
      font-size: 12px;
    }
    .login-divider::before, .login-divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border);
    }

    #googleBtnWrap { display: flex; justify-content: center; }

    .login-note {
      margin-top: 24px;
      font-size: 11px;
      color: #aaa;
    }

    #loginError {
      background: #fef2f2;
      color: #dc2626;
      border-radius: 8px;
      padding: 10px 14px;
      font-size: 13px;
      margin-bottom: 16px;
      display: none;
    }

    /* ── App layout ─────────────────────────────────────────────── */
    #appWrap { display: flex; min-height: 100vh; }

    /* Sidebar */
    .sidebar {
      width: 260px;
      background: var(--sidebar);
      display: flex;
      flex-direction: column;
      flex-shrink: 0;
      position: fixed;
      top: 0; left: 0; bottom: 0;
      z-index: 100;
      overflow-y: auto;
    }

    .sb-brand {
      padding: 24px 20px 16px;
      border-bottom: 1px solid rgba(255,255,255,.08);
    }

    .sb-brand img { width: 120px; filter: brightness(0) invert(1); }

    .sb-user {
      padding: 20px;
      display: flex;
      align-items: center;
      gap: 12px;
      border-bottom: 1px solid rgba(255,255,255,.08);
    }

    .sb-avatar {
      width: 44px;
      height: 44px;
      border-radius: 50%;
      object-fit: cover;
      border: 2px solid var(--teal);
      flex-shrink: 0;
    }

    .sb-avatar-placeholder {
      width: 44px;
      height: 44px;
      border-radius: 50%;
      background: var(--teal);
      display: flex;
      align-items: center;
      justify-content: center;
      color: #fff;
      font-size: 18px;
      flex-shrink: 0;
    }

    .sb-user-info { overflow: hidden; }
    .sb-user-name { color: #fff; font-weight: 600; font-size: 14px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .sb-user-email { color: rgba(255,255,255,.5); font-size: 11px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

    .sb-nav { padding: 12px 0; flex: 1; }

    .sb-nav a {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px 20px;
      color: rgba(255,255,255,.65);
      text-decoration: none;
      font-size: 14px;
      font-weight: 500;
      transition: all .15s;
      cursor: pointer;
    }

    .sb-nav a:hover { background: var(--sb-hover); color: #fff; }
    .sb-nav a.active { background: var(--teal); color: #fff; }
    .sb-nav a i { width: 18px; text-align: center; }

    .sb-footer {
      padding: 16px 20px;
      border-top: 1px solid rgba(255,255,255,.08);
    }

    .sb-logout {
      display: flex;
      align-items: center;
      gap: 10px;
      color: rgba(255,255,255,.5);
      font-size: 13px;
      cursor: pointer;
      background: none;
      border: none;
      width: 100%;
      padding: 8px 0;
      transition: color .15s;
    }

    .sb-logout:hover { color: var(--danger); }

    /* Main content */
    .main-content {
      flex: 1;
      margin-left: 260px;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    .main-topbar {
      background: #fff;
      border-bottom: 1px solid var(--border);
      padding: 16px 32px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 50;
    }

    .main-topbar h2 { font-size: 18px; font-weight: 700; color: var(--text); }

    .page-body { padding: 32px; max-width: 900px; }

    /* ── Page: Inicio ───────────────────────────────────────────── */
    .welcome-greeting {
      font-size: 26px;
      font-weight: 700;
      margin-bottom: 4px;
    }

    .welcome-sub { color: var(--muted); font-size: 14px; margin-bottom: 28px; }

    .stats-row {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
      gap: 16px;
      margin-bottom: 32px;
    }

    .stat-card {
      background: var(--card-bg);
      border-radius: 14px;
      padding: 24px;
      border: 1px solid var(--border);
      text-align: center;
    }

    .stat-num { font-size: 36px; font-weight: 700; color: var(--teal); }
    .stat-label { font-size: 13px; color: var(--muted); margin-top: 4px; }

    .section-title {
      font-size: 16px;
      font-weight: 700;
      margin-bottom: 16px;
      color: var(--text);
    }

    /* ── Routines ───────────────────────────────────────────────── */
    .routines-list { display: flex; flex-direction: column; gap: 16px; }

    .routine-card {
      background: var(--card-bg);
      border-radius: 14px;
      border: 1px solid var(--border);
      overflow: hidden;
    }

    .routine-header {
      padding: 18px 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      cursor: pointer;
      user-select: none;
    }

    .routine-header:hover { background: #fafafa; }

    .routine-title-wrap { display: flex; align-items: center; gap: 12px; flex: 1; }
    .routine-icon { width: 40px; height: 40px; border-radius: 10px; background: var(--teal-lt); display: flex; align-items: center; justify-content: center; color: var(--teal); font-size: 16px; flex-shrink: 0; }
    .routine-name { font-weight: 600; font-size: 15px; }
    .routine-date { font-size: 12px; color: var(--muted); margin-top: 2px; }

    .status-badge {
      font-size: 11px;
      font-weight: 600;
      padding: 3px 10px;
      border-radius: 20px;
      white-space: nowrap;
      flex-shrink: 0;
    }

    .status-activa    { background: #d1fae5; color: #065f46; }
    .status-pausada   { background: #fef3c7; color: #92400e; }
    .status-completada{ background: #e5e7eb; color: #374151; }

    .routine-chevron { color: var(--muted); transition: transform .2s; flex-shrink: 0; }
    .routine-card.open .routine-chevron { transform: rotate(180deg); }

    .routine-body {
      display: none;
      padding: 0 20px 20px;
      border-top: 1px solid var(--border);
    }
    .routine-card.open .routine-body { display: block; }

    .routine-desc { color: var(--muted); font-size: 13px; padding: 14px 0 10px; line-height: 1.5; }

    .exercises-list { display: flex; flex-direction: column; gap: 10px; margin-top: 10px; }

    .exercise-item {
      display: flex;
      align-items: flex-start;
      gap: 14px;
      background: var(--bg);
      border-radius: 10px;
      padding: 14px;
    }

    .ex-icon { width: 36px; height: 36px; background: var(--teal-lt); border-radius: 8px; display: flex; align-items: center; justify-content: center; color: var(--teal); font-size: 14px; flex-shrink: 0; }
    .ex-name { font-weight: 600; font-size: 14px; margin-bottom: 3px; }
    .ex-meta { font-size: 12px; color: var(--teal); font-weight: 600; margin-bottom: 4px; }
    .ex-desc { font-size: 12px; color: var(--muted); line-height: 1.4; }

    .ex-video {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      margin-top: 6px;
      font-size: 12px;
      color: var(--teal);
      font-weight: 600;
      text-decoration: none;
    }
    .ex-video:hover { text-decoration: underline; }

    /* ── Profile ────────────────────────────────────────────────── */
    .profile-card {
      background: var(--card-bg);
      border-radius: 16px;
      border: 1px solid var(--border);
      padding: 32px;
      max-width: 520px;
    }

    .profile-avatar-wrap {
      display: flex;
      align-items: center;
      gap: 20px;
      margin-bottom: 28px;
    }

    .profile-avatar {
      width: 80px;
      height: 80px;
      border-radius: 50%;
      object-fit: cover;
      border: 3px solid var(--teal);
    }

    .profile-name { font-size: 20px; font-weight: 700; }
    .profile-email { color: var(--muted); font-size: 13px; }

    .form-group { margin-bottom: 20px; }

    .form-group label {
      display: block;
      font-size: 12px;
      font-weight: 600;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: .5px;
      margin-bottom: 6px;
    }

    .form-group input {
      width: 100%;
      padding: 11px 14px;
      border: 1.5px solid var(--border);
      border-radius: 10px;
      font-size: 14px;
      font-family: inherit;
      color: var(--text);
      background: #fff;
      transition: border-color .15s;
      outline: none;
    }

    .form-group input:focus { border-color: var(--teal); }
    .form-group input:disabled { background: #f9fafb; color: var(--muted); cursor: not-allowed; }

    .btn-primary {
      background: var(--teal);
      color: #fff;
      border: none;
      border-radius: 10px;
      padding: 12px 24px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: background .15s;
      font-family: inherit;
    }

    .btn-primary:hover { background: var(--teal-dk); }
    .btn-primary:disabled { opacity: .6; cursor: not-allowed; }

    /* ── Empty state ─────────────────────────────────────────────── */
    .empty-state {
      text-align: center;
      padding: 60px 24px;
      color: var(--muted);
    }

    .empty-state i { font-size: 48px; color: var(--teal-lt); margin-bottom: 16px; display: block; }
    .empty-state h3 { font-size: 18px; color: var(--text); margin-bottom: 8px; }
    .empty-state p { font-size: 14px; line-height: 1.5; }

    /* ── Spinner / toast ─────────────────────────────────────────── */
    .spinner { text-align: center; padding: 60px 0; color: var(--teal); font-size: 28px; }

    .toast {
      position: fixed;
      bottom: 24px;
      right: 24px;
      padding: 14px 20px;
      border-radius: 10px;
      font-size: 14px;
      font-weight: 600;
      z-index: 9999;
      box-shadow: 0 8px 24px rgba(0,0,0,.15);
      animation: slideUp .25s ease;
    }

    .toast-success { background: #d1fae5; color: #065f46; }
    .toast-error   { background: #fef2f2; color: #dc2626; }

    @keyframes slideUp { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

    /* ── Clinic info card ───────────────────────────────────────── */
    .clinic-card {
      background: var(--teal);
      border-radius: 14px;
      padding: 20px 24px;
      color: #fff;
      margin-top: 28px;
    }

    .clinic-card h3 { font-size: 15px; margin-bottom: 10px; opacity: .85; }
    .clinic-info-row { display: flex; align-items: center; gap: 10px; font-size: 14px; font-weight: 500; margin-bottom: 6px; }
    .clinic-info-row a { color: #fff; text-decoration: none; }
    .clinic-info-row a:hover { text-decoration: underline; }

    /* ── Mobile ─────────────────────────────────────────────────── */
    .mob-topbar {
      display: none;
      background: var(--sidebar);
      padding: 14px 20px;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .mob-topbar img { width: 100px; filter: brightness(0) invert(1); }
    .mob-menu-btn { background: none; border: none; color: #fff; font-size: 20px; cursor: pointer; }

    .mob-nav {
      display: none;
      position: fixed;
      inset: 0;
      z-index: 200;
      background: rgba(0,0,0,.5);
    }

    .mob-nav-inner {
      width: 260px;
      height: 100%;
      background: var(--sidebar);
      display: flex;
      flex-direction: column;
      overflow-y: auto;
    }

    @media (max-width: 768px) {
      .sidebar { display: none; }
      .main-content { margin-left: 0; }
      .main-topbar { display: none; }
      .mob-topbar { display: flex; }
      .page-body { padding: 20px; }
      .login-card { padding: 36px 24px; }
    }
  </style>
</head>
<body>

<!-- ══════════════════ LOGIN SCREEN ══════════════════════════════ -->
<div id="loginScreen">
  <div class="login-card">
    <img src="/logos/KINERVANE.png" class="login-logo" alt="Kinerva">
    <h1>Mi Portal de Salud</h1>
    <p>Accede a tu perfil, consulta tus rutinas de rehabilitación y mantente al día con tu evolución.</p>
    <div id="loginError"></div>
    <div class="login-divider">Inicia sesión con</div>
    <div id="googleBtnWrap"></div>
    <p class="login-note">Al iniciar sesión aceptas que tus datos sean usados para tu atención médica en Kinerva Fisioterapia.</p>
  </div>
</div>

<!-- ══════════════════ APP LAYOUT ════════════════════════════════ -->
<div id="appWrap" hidden>

  <!-- Mobile topbar -->
  <div class="mob-topbar">
    <img src="/logos/KINERVANE.png" alt="Kinerva">
    <button class="mob-menu-btn" onclick="toggleMobNav()"><i class="fas fa-bars"></i></button>
  </div>

  <!-- Mobile nav overlay -->
  <div class="mob-nav" id="mobNav" onclick="toggleMobNav()">
    <div class="mob-nav-inner" onclick="event.stopPropagation()">
      <!-- same sidebar content injected by JS -->
      <div id="mobSidebarContent"></div>
    </div>
  </div>

  <!-- Desktop Sidebar -->
  <aside class="sidebar" id="desktopSidebar">
    <div class="sb-brand">
      <img src="/logos/KINERVANE.png" alt="Kinerva">
    </div>
    <div class="sb-user">
      <div id="sbAvatarWrap"></div>
      <div class="sb-user-info">
        <div class="sb-user-name" id="sbName">—</div>
        <div class="sb-user-email" id="sbEmail">—</div>
      </div>
    </div>
    <nav class="sb-nav" id="sbNav">
      <a data-page="inicio" onclick="goTo('inicio')"><i class="fas fa-home"></i> Inicio</a>
      <a data-page="perfil" onclick="goTo('perfil')"><i class="fas fa-user-circle"></i> Mi Perfil</a>
      <a data-page="rutinas" onclick="goTo('rutinas')"><i class="fas fa-dumbbell"></i> Mis Rutinas</a>
    </nav>
    <div class="sb-footer">
      <button class="sb-logout" onclick="signOut()">
        <i class="fas fa-sign-out-alt"></i> Cerrar sesión
      </button>
    </div>
  </aside>

  <!-- Main area -->
  <div class="main-content">
    <div class="main-topbar">
      <h2 id="topbarTitle">Inicio</h2>
    </div>
    <div class="page-body" id="pageBody">
      <div class="spinner"><i class="fas fa-circle-notch fa-spin"></i></div>
    </div>
  </div>

</div>

<!-- Google Identity Services -->
<script src="https://accounts.google.com/gsi/client" async defer></script>

<script>
'use strict';

let TOKEN = null;
let USER  = null;

/* ── Utils ───────────────────────────────────────────────────── */
function esc(v) {
  if (v == null) return '';
  return String(v).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function showToast(msg, type = 'success') {
  const t = document.createElement('div');
  t.className = `toast toast-${type}`;
  t.textContent = msg;
  document.body.appendChild(t);
  setTimeout(() => t.remove(), 3500);
}

async function portalFetch(method, url, body) {
  try {
    const r = await fetch(url, {
      method,
      headers: { 'Content-Type': 'application/json', Authorization: `Bearer ${TOKEN}` },
      body: body ? JSON.stringify(body) : undefined,
    });
    return await r.json();
  } catch { return null; }
}

function fmtDate(d) {
  if (!d) return '—';
  const s = String(d).slice(0,10);
  const [y,m,day] = s.split('-');
  return `${day}/${m}/${y}`;
}

/* ── Auth ────────────────────────────────────────────────────── */
async function initPortal() {
  TOKEN = localStorage.getItem('k_patient_token');
  const raw = localStorage.getItem('k_patient_user');
  if (TOKEN && raw) {
    try {
      // Check token expiry
      const payload = JSON.parse(atob(TOKEN.split('.')[1]));
      if (payload.exp * 1000 > Date.now()) {
        USER = JSON.parse(raw);
        showApp();
        return;
      }
    } catch { /* invalid token, fall through */ }
  }
  localStorage.removeItem('k_patient_token');
  localStorage.removeItem('k_patient_user');
  showLoginScreen();
}

async function showLoginScreen() {
  document.getElementById('loginScreen').hidden = false;
  document.getElementById('appWrap').hidden = true;

  // Wait for GIS to load
  let attempts = 0;
  while (typeof google === 'undefined' && attempts < 30) {
    await new Promise(r => setTimeout(r, 200));
    attempts++;
  }

  if (typeof google === 'undefined') {
    showLoginError('Error al cargar Google Sign-In. Verifica tu conexión.');
    return;
  }

  let clientId = '';
  try {
    const r = await fetch('/api/auth/config');
    const d = await r.json();
    clientId = d.clientId;
  } catch { /* use empty */ }

  if (!clientId) {
    showLoginError('El portal no está configurado aún. Contacta a la clínica.');
    return;
  }

  google.accounts.id.initialize({
    client_id: clientId,
    callback: handleGoogleSignIn,
    auto_select: false,
    cancel_on_tap_outside: true,
  });

  google.accounts.id.renderButton(
    document.getElementById('googleBtnWrap'),
    { theme: 'outline', size: 'large', locale: 'es', width: 280, text: 'signin_with' }
  );
}

function showLoginError(msg) {
  const el = document.getElementById('loginError');
  el.textContent = msg;
  el.style.display = 'block';
}

async function handleGoogleSignIn(response) {
  try {
    const r = await fetch('/api/auth/google', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ credential: response.credential }),
    });
    const d = await r.json();
    if (!d.success) { showLoginError(d.message || 'Error al iniciar sesión.'); return; }
    TOKEN = d.token;
    USER  = d.user;
    localStorage.setItem('k_patient_token', TOKEN);
    localStorage.setItem('k_patient_user', JSON.stringify(USER));
    showApp();
  } catch { showLoginError('Error de red. Intenta de nuevo.'); }
}

function showApp() {
  document.getElementById('loginScreen').hidden = true;
  document.getElementById('appWrap').hidden = false;
  updateSidebarUser();
  goTo('inicio');
}

function signOut() {
  TOKEN = null; USER = null;
  localStorage.removeItem('k_patient_token');
  localStorage.removeItem('k_patient_user');
  if (typeof google !== 'undefined') google.accounts.id.disableAutoSelect();
  showLoginScreen();
}

/* ── Sidebar / nav ───────────────────────────────────────────── */
function updateSidebarUser() {
  if (!USER) return;
  document.getElementById('sbName').textContent  = USER.name  || '—';
  document.getElementById('sbEmail').textContent = USER.email || '—';

  const wrap = document.getElementById('sbAvatarWrap');
  if (USER.picture) {
    wrap.innerHTML = `<img src="${esc(USER.picture)}" class="sb-avatar" alt="">`;
  } else {
    wrap.innerHTML = `<div class="sb-avatar-placeholder"><i class="fas fa-user"></i></div>`;
  }
  syncMobSidebar();
}

function syncMobSidebar() {
  document.getElementById('mobSidebarContent').innerHTML =
    document.getElementById('desktopSidebar').innerHTML;
  // Re-wire onclick on cloned nodes
  document.querySelectorAll('#mobSidebarContent [data-page]').forEach(a => {
    const pg = a.dataset.page;
    a.onclick = () => { goTo(pg); toggleMobNav(); };
  });
  document.querySelector('#mobSidebarContent .sb-logout').onclick = signOut;
}

function toggleMobNav() {
  const nav = document.getElementById('mobNav');
  nav.style.display = nav.style.display === 'flex' ? 'none' : 'flex';
}

function goTo(page) {
  document.querySelectorAll('.sb-nav a').forEach(a =>
    a.classList.toggle('active', a.dataset.page === page)
  );
  const titles = { inicio: 'Inicio', perfil: 'Mi Perfil', rutinas: 'Mis Rutinas' };
  document.getElementById('topbarTitle').textContent = titles[page] || '';
  document.getElementById('pageBody').innerHTML =
    '<div class="spinner"><i class="fas fa-circle-notch fa-spin"></i></div>';
  Pages[page]?.();
}

/* ══════════════════ PAGES ═══════════════════════════════════ */
const Pages = {

  async inicio() {
    const body = document.getElementById('pageBody');
    const data = await portalFetch('GET', '/api/patient/routines');
    const routines = data?.routines || [];
    const active = routines.filter(r => r.status === 'activa').length;
    const firstName = (USER.name || 'Paciente').split(' ')[0];

    body.innerHTML = `
      <p class="welcome-greeting">Hola, ${esc(firstName)} 👋</p>
      <p class="welcome-sub">Bienvenido a tu portal de salud Kinerva</p>

      <div class="stats-row">
        <div class="stat-card">
          <div class="stat-num">${active}</div>
          <div class="stat-label">Rutinas activas</div>
        </div>
        <div class="stat-card">
          <div class="stat-num">${routines.length}</div>
          <div class="stat-label">Total de rutinas</div>
        </div>
        <div class="stat-card">
          <div class="stat-num">${routines.reduce((s,r)=>s+(r.exercises?.length||0),0)}</div>
          <div class="stat-label">Ejercicios asignados</div>
        </div>
      </div>

      ${routines.length > 0 ? `
        <p class="section-title">Última rutina asignada</p>
        ${renderRoutineCard(routines[0], true)}
      ` : `
        <div class="empty-state">
          <i class="fas fa-clipboard-list"></i>
          <h3>Sin rutinas aún</h3>
          <p>Tu fisioterapeuta te asignará rutinas de rehabilitación personalizadas próximamente.</p>
        </div>
      `}

      <div class="clinic-card">
        <h3><i class="fas fa-clinic-medical"></i> Kinerva Fisioterapia</h3>
        <div class="clinic-info-row"><i class="fas fa-phone"></i><a href="tel:+523330249555">333 024 9555</a></div>
        <div class="clinic-info-row"><i class="fas fa-envelope"></i><a href="mailto:contacto@kinervafisioterapia.com">contacto@kinervafisioterapia.com</a></div>
        <div class="clinic-info-row"><i class="fas fa-clock"></i> Lun–Vie 8:00–22:00 · Sáb 9:00–14:00</div>
      </div>
    `;
    bindAccordions(body);
  },

  async perfil() {
    const body = document.getElementById('pageBody');
    const data = await portalFetch('GET', '/api/patient/me');
    const u = data?.user || USER;

    body.innerHTML = `
      <div class="profile-card">
        <div class="profile-avatar-wrap">
          ${u.picture
            ? `<img src="${esc(u.picture)}" class="profile-avatar" alt="">`
            : `<div class="sb-avatar-placeholder" style="width:80px;height:80px;font-size:28px"><i class="fas fa-user"></i></div>`}
          <div>
            <div class="profile-name">${esc(u.name || '—')}</div>
            <div class="profile-email">${esc(u.email)}</div>
          </div>
        </div>

        <form id="profileForm">
          <div class="form-group">
            <label>Nombre completo</label>
            <input name="name" value="${esc(u.name || '')}" placeholder="Tu nombre">
          </div>
          <div class="form-group">
            <label>Correo electrónico</label>
            <input value="${esc(u.email)}" disabled>
          </div>
          <div class="form-group">
            <label>Teléfono</label>
            <input name="phone" value="${esc(u.phone || '')}" placeholder="33 XXXX XXXX">
          </div>
          <div class="form-group">
            <label>Fecha de nacimiento</label>
            <input type="date" name="birth_date" value="${esc(u.birth_date || '')}">
          </div>
          <button type="submit" class="btn-primary" id="saveBtn">
            <i class="fas fa-save"></i> Guardar cambios
          </button>
        </form>
      </div>

      <p style="color:var(--muted);font-size:12px;margin-top:16px">
        Paciente desde ${fmtDate(u.created_at)}
      </p>
    `;

    document.getElementById('profileForm').addEventListener('submit', async e => {
      e.preventDefault();
      const f = e.target;
      const btn = document.getElementById('saveBtn');
      btn.disabled = true; btn.textContent = 'Guardando…';
      const r = await portalFetch('PATCH', '/api/patient/me', {
        name: f.name.value.trim() || null,
        phone: f.phone.value.trim() || null,
        birth_date: f.birth_date.value || null,
      });
      btn.disabled = false; btn.innerHTML = '<i class="fas fa-save"></i> Guardar cambios';
      if (r?.success) {
        USER = r.user;
        localStorage.setItem('k_patient_user', JSON.stringify(USER));
        updateSidebarUser();
        showToast('Perfil actualizado correctamente');
      } else {
        showToast('Error al guardar. Intenta de nuevo.', 'error');
      }
    });
  },

  async rutinas() {
    const body = document.getElementById('pageBody');
    const data = await portalFetch('GET', '/api/patient/routines');
    const routines = data?.routines || [];

    if (!routines.length) {
      body.innerHTML = `
        <div class="empty-state">
          <i class="fas fa-dumbbell"></i>
          <h3>Sin rutinas asignadas</h3>
          <p>Tu fisioterapeuta te asignará rutinas de rehabilitación personalizadas. Visita la clínica o contáctanos para más información.</p>
        </div>`;
      return;
    }

    body.innerHTML = `
      <p class="section-title">${routines.length} rutina${routines.length !== 1 ? 's' : ''} asignada${routines.length !== 1 ? 's' : ''}</p>
      <div class="routines-list" id="routinesList">
        ${routines.map(r => renderRoutineCard(r)).join('')}
      </div>`;
    bindAccordions(body);
  },
};

/* ── Components ──────────────────────────────────────────────── */
function renderRoutineCard(r, open = false) {
  const sMap = {
    activa:     ['Activa',      'status-activa'],
    pausada:    ['Pausada',     'status-pausada'],
    completada: ['Completada',  'status-completada'],
  };
  const [label, cls] = sMap[r.status] || ['Activa', 'status-activa'];

  return `
    <div class="routine-card${open ? ' open' : ''}" data-id="${r.id}">
      <div class="routine-header" onclick="this.parentElement.classList.toggle('open')">
        <div class="routine-title-wrap">
          <div class="routine-icon"><i class="fas fa-clipboard-list"></i></div>
          <div>
            <div class="routine-name">${esc(r.title)}</div>
            <div class="routine-date">Asignada el ${fmtDate(r.created_at)}</div>
          </div>
        </div>
        <span class="status-badge ${cls}">${label}</span>
        <i class="fas fa-chevron-down routine-chevron"></i>
      </div>
      <div class="routine-body">
        ${r.description ? `<p class="routine-desc">${esc(r.description)}</p>` : ''}
        <div class="exercises-list">
          ${(r.exercises || []).length
            ? r.exercises.map(ex => renderExercise(ex)).join('')
            : '<p style="color:var(--muted);font-size:13px;margin-top:8px">Sin ejercicios aún.</p>'}
        </div>
      </div>
    </div>`;
}

function renderExercise(ex) {
  const parts = [];
  if (ex.sets && ex.reps) parts.push(`${ex.sets} series × ${ex.reps} repeticiones`);
  else if (ex.sets)       parts.push(`${ex.sets} series`);
  if (ex.duration_seconds) parts.push(`${ex.duration_seconds} seg`);

  return `
    <div class="exercise-item">
      <div class="ex-icon"><i class="fas fa-dumbbell"></i></div>
      <div style="flex:1">
        <div class="ex-name">${esc(ex.name)}</div>
        ${parts.length ? `<div class="ex-meta">${parts.join(' · ')}</div>` : ''}
        ${ex.description ? `<div class="ex-desc">${esc(ex.description)}</div>` : ''}
        ${ex.video_url ? `<a href="${esc(ex.video_url)}" target="_blank" rel="noopener" class="ex-video"><i class="fas fa-play-circle"></i> Ver video</a>` : ''}
      </div>
    </div>`;
}

function bindAccordions(container) {
  // CSS toggle handles it via onclick on .routine-header
}

initPortal();
</script>
</body>
