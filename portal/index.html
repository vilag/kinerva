<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Portal | Kinerva Fisioterapia</title>
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#00BDB4">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Kinerva">
  <link rel="apple-touch-icon" href="/icons/icon.svg">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --teal:    #00BDB4;
      --teal-dk: #009A92;
      --teal-lt: #E6F8F7;
      --text:    #1a2533;
      --muted:   #6b7280;
      --border:  #e5e7eb;
    }

    body {
      font-family: 'Inter', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #0f2027 0%, #203a43 50%, #2c5364 100%);
      padding: 24px;
    }

    .login-card {
      background: #fff;
      border-radius: 20px;
      padding: 44px 40px;
      width: 100%;
      max-width: 420px;
      box-shadow: 0 24px 64px rgba(0,0,0,.3);
    }

    .login-logo {
      display: block;
      width: 130px;
      margin: 0 auto 20px;
      filter: brightness(0) saturate(100%) invert(55%) sepia(82%) saturate(400%) hue-rotate(145deg) brightness(95%);
    }

    .login-card h1 {
      text-align: center;
      font-size: 20px;
      font-weight: 700;
      margin-bottom: 24px;
      color: var(--text);
    }

    .role-tabs {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      margin-bottom: 24px;
    }

    .role-tab {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
      padding: 14px 10px;
      border: 2px solid var(--border);
      border-radius: 12px;
      background: #fff;
      color: var(--muted);
      font-size: 13px;
      font-weight: 600;
      font-family: inherit;
      cursor: pointer;
      transition: all .15s;
    }

    .role-tab i { font-size: 22px; }
    .role-tab:hover { border-color: var(--teal); color: var(--teal); }
    .role-tab.active { border-color: var(--teal); background: var(--teal-lt); color: var(--teal); }

    .form-group { margin-bottom: 16px; }

    .form-group label {
      display: block;
      font-size: 12px;
      font-weight: 600;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: .4px;
      margin-bottom: 6px;
    }

    .input-wrap { position: relative; }

    .input-wrap i {
      position: absolute;
      left: 13px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--muted);
      font-size: 14px;
    }

    .form-group input {
      width: 100%;
      padding: 11px 14px 11px 38px;
      border: 1.5px solid var(--border);
      border-radius: 10px;
      font-size: 14px;
      font-family: inherit;
      color: var(--text);
      outline: none;
      transition: border-color .15s;
    }

    .form-group input:focus { border-color: var(--teal); }

    .btn-login {
      width: 100%;
      padding: 13px;
      background: var(--teal);
      color: #fff;
      border: none;
      border-radius: 10px;
      font-size: 15px;
      font-weight: 600;
      font-family: inherit;
      cursor: pointer;
      transition: background .15s;
      margin-top: 4px;
    }

    .btn-login:hover { background: var(--teal-dk); }
    .btn-login:disabled { opacity: .6; cursor: not-allowed; }

    .login-error {
      background: #fef2f2;
      color: #dc2626;
      border-radius: 8px;
      padding: 10px 14px;
      font-size: 13px;
      margin-bottom: 14px;
      display: none;
      text-align: center;
    }

    @media (max-width: 480px) {
      .login-card { padding: 34px 22px; }
    }
  </style>
</head>
<body>

<div class="login-card">
  <img src="/logos/KINERVANE.png" class="login-logo" alt="Kinerva">
  <h1>Portal de Acceso</h1>

  <div class="role-tabs">
    <button class="role-tab active" data-role="paciente" onclick="selectRole('paciente')">
      <i class="fas fa-user-injured"></i>
      Paciente
    </button>
    <button class="role-tab" data-role="admin" onclick="selectRole('admin')">
      <i class="fas fa-user-shield"></i>
      Administrador
    </button>
  </div>

  <div id="loginError" class="login-error"></div>

  <form id="loginForm" onsubmit="handleLogin(event)">
    <div class="form-group">
      <label>Usuario</label>
      <div class="input-wrap">
        <i class="fas fa-user"></i>
        <input type="text" id="loginUser" placeholder="Tu usuario" required autocomplete="username">
      </div>
    </div>
    <div class="form-group">
      <label>Contraseña</label>
      <div class="input-wrap">
        <i class="fas fa-lock"></i>
        <input type="password" id="loginPass" placeholder="••••••••" required autocomplete="current-password">
      </div>
    </div>
    <button type="submit" class="btn-login" id="loginBtn">
      <i class="fas fa-sign-in-alt"></i> Iniciar sesión
    </button>
  </form>
</div>

<script>
'use strict';

let ROLE = 'paciente';

function selectRole(role) {
  ROLE = role;
  document.querySelectorAll('.role-tab').forEach(b =>
    b.classList.toggle('active', b.dataset.role === role)
  );
  clearError();
}

function clearError() {
  const el = document.getElementById('loginError');
  el.style.display = 'none';
  el.textContent = '';
}

function showError(msg) {
  const el = document.getElementById('loginError');
  el.textContent = msg;
  el.style.display = 'block';
}

async function handleLogin(e) {
  e.preventDefault();
  clearError();
  const username = document.getElementById('loginUser').value.trim();
  const password = document.getElementById('loginPass').value;
  const btn = document.getElementById('loginBtn');

  if (!username || !password) { showError('Completa usuario y contraseña.'); return; }

  btn.disabled = true;
  btn.innerHTML = '<i class="fas fa-circle-notch fa-spin"></i> Entrando…';

  try {
    if (ROLE === 'admin') {
      const r = await fetch('/api/admin/auth', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ action: 'login', username, password }),
      });
      const d = await r.json();
      if (!d.success) { showError(d.message || 'Credenciales incorrectas.'); return; }
      localStorage.setItem('kinerva_token', d.token);
      localStorage.setItem('kinerva_user',  d.username || username);
      window.location.href = '/admin';
    } else {
      const r = await fetch('/api/auth/patient', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ username, password }),
      });
      const d = await r.json();
      if (!d.success) { showError(d.message || 'Credenciales incorrectas.'); return; }
      localStorage.setItem('k_patient_token', d.token);
      localStorage.setItem('k_patient_user',  JSON.stringify(d.user));
      window.location.href = '/paciente';
    }
  } catch {
    showError('Error de red. Intenta de nuevo.');
  } finally {
    btn.disabled = false;
    btn.innerHTML = '<i class="fas fa-sign-in-alt"></i> Iniciar sesión';
  }
}

// Si ya tiene sesión activa, redirigir directamente
(function checkExisting() {
  const adminToken = localStorage.getItem('kinerva_token');
  if (adminToken) {
    try {
      const p = JSON.parse(atob(adminToken.split('.')[1]));
      if (p.exp * 1000 > Date.now()) { window.location.href = '/admin'; return; }
    } catch { localStorage.removeItem('kinerva_token'); }
  }
  const patToken = localStorage.getItem('k_patient_token');
  if (patToken) {
    try {
      const p = JSON.parse(atob(patToken.split('.')[1]));
      if (p.exp * 1000 > Date.now()) { window.location.href = '/paciente'; return; }
    } catch { localStorage.removeItem('k_patient_token'); localStorage.removeItem('k_patient_user'); }
  }
})();
</script>
  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('/sw.js').catch(() => {});
    }
  </script>
</body>
</html>
