<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Kinerva Admin</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
  <link href="/admin/assets/admin.css" rel="stylesheet">
</head>
<body>

  <!-- ── Login / Setup ───────────────────────────────────────────── -->
  <div id="authScreen"></div>

  <!-- ── Panel principal ────────────────────────────────────────── -->
  <div id="adminPanel" style="display:none">
    <aside class="ak-sidebar">
      <a class="ak-brand" href="#dashboard">
        <i class="fas fa-heartbeat"></i> Kinerva
      </a>
      <nav class="ak-nav">
        <a href="#dashboard"><i class="fas fa-chart-pie"></i> Dashboard</a>
        <span class="ak-nav-sep">Gestión</span>
        <a href="#appointments"><i class="fas fa-calendar-check"></i> Citas</a>
        <a href="#patients"><i class="fas fa-user-injured"></i> Pacientes</a>
        <span class="ak-nav-sep">Clínico</span>
        <a href="#expediente"><i class="fas fa-file-medical-alt"></i> Expediente</a>
      </nav>
      <div class="ak-user-foot">
        <i class="fas fa-user-circle"></i>
        <span id="userLabel"></span>
        <a href="#" id="logoutBtn" title="Cerrar sesión"><i class="fas fa-sign-out-alt"></i></a>
      </div>
    </aside>

    <div class="ak-main">
      <div class="ak-topbar">
        <span class="ak-topbar-title" id="pageTitle"></span>
        <span class="ak-topbar-meta" id="topDate"></span>
      </div>
      <div class="ak-body" id="pageContent">
        <div class="text-center py-5">
          <i class="fas fa-circle-notch fa-spin fa-2x text-muted"></i>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <script src="/admin/app.js"></script>
</body>
</html>
